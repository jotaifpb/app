<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">

<title>Controle de Medicamentos</title>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

:root{
--cor1:#2f7fe0;
--cor2:#0d47a1;
--cor3:#5aa9f7;
--verde:#2e9e5b;
--vermelho:#e5484d;
--laranja:#ff9800;
--roxo:#7c4fd6;
--bg-app:#eef3fb;
--texto:#1f2937;
--texto-suave:#64748b;
--card-bg:#ffffff;
--borda-suave:#e3e9f5;
--raio:18px;
--raio-sm:12px;
--sombra:0 8px 24px rgba(19,55,109,0.12);
--sombra-hover:0 14px 32px rgba(19,55,109,0.18);
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',system-ui,Arial,sans-serif;
background:
radial-gradient(circle at 12% -10%, rgba(255,255,255,0.18), transparent 45%),
radial-gradient(circle at 100% 0%, rgba(124,79,214,0.35), transparent 40%),
linear-gradient(160deg,var(--cor1) 0%,var(--cor2) 55%,#082a63 100%);
background-attachment:fixed;
color:var(--texto);
min-height:100vh;
padding-bottom:40px;
}

header{
background:rgba(255,255,255,0.97);
backdrop-filter:blur(6px);
padding:20px 15px;
text-align:center;
font-size:24px;
font-weight:800;
letter-spacing:.2px;
color:var(--cor2);
box-shadow:0 4px 18px rgba(0,0,0,0.18);
position:sticky;
top:0;
z-index:50;
border-bottom:3px solid var(--cor1);
}

.container{
padding:18px 15px 10px;
max-width:560px;
margin:auto;
}

.secao-titulo{
color:#fff;
text-align:center;
margin:28px 0 14px;
font-size:19px;
font-weight:700;
text-shadow:0 2px 6px rgba(0,0,0,0.25);
letter-spacing:.3px;
}

form{
background:var(--card-bg);
padding:22px 18px 20px;
border-radius:22px;
box-shadow:var(--sombra);
border:1px solid rgba(255,255,255,0.6);
}

label{
font-weight:700;
font-size:14px;
color:var(--cor2);
display:block;
margin-top:14px;
margin-bottom:2px;
letter-spacing:.2px;
}

label:first-of-type{
margin-top:0;
}

input,select,button{
width:100%;
padding:14px 14px;
margin:6px 0 4px;
font-size:17px;
border-radius:var(--raio-sm);
border:1.5px solid var(--borda-suave);
background:#f8fafc;
color:var(--texto);
transition:border-color .15s ease, box-shadow .15s ease, transform .05s ease;
font-family:inherit;
}

input::placeholder{
color:#9aa5b6;
}

input:focus,select:focus{
outline:none;
border-color:var(--cor1);
box-shadow:0 0 0 4px rgba(47,127,224,0.15);
background:#fff;
}

select{
appearance:none;
background-image:linear-gradient(45deg, transparent 50%, var(--cor2) 50%), linear-gradient(135deg, var(--cor2) 50%, transparent 50%);
background-position: calc(100% - 20px) calc(1.1em), calc(100% - 15px) calc(1.1em);
background-size:5px 5px, 5px 5px;
background-repeat:no-repeat;
cursor:pointer;
}

button{
background:linear-gradient(135deg,var(--cor1),var(--cor2));
color:white;
font-weight:700;
font-size:16px;
border:none;
cursor:pointer;
letter-spacing:.2px;
box-shadow:0 6px 16px rgba(29,86,166,0.35);
transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
margin-top:12px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 22px rgba(29,86,166,0.42);
filter:brightness(1.03);
}

button:active{
transform:translateY(0);
}

.btn-excluir{
background:linear-gradient(135deg,var(--vermelho),#b3261e);
box-shadow:0 6px 14px rgba(211,47,47,0.35);
width:auto;
padding:9px 16px;
font-size:13px;
margin-top:10px;
border-radius:10px;
}

.botao-concluir{
background:linear-gradient(135deg,#ffb84d,var(--laranja));
font-size:19px;
box-shadow:0 8px 20px rgba(255,152,0,0.45);
margin-top:18px;
padding:16px;
border-radius:14px;
}

.btn-scan{
background:linear-gradient(135deg,#9b6ae0,var(--roxo));
box-shadow:0 6px 16px rgba(124,79,214,0.4);
}

#scanner{
width:100%;
height:280px;
display:none;
border-radius:var(--raio-sm);
overflow:hidden;
margin-top:8px;
border:3px solid var(--roxo);
box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

/* ===== BIBLIOTECA / GALERIA DE IMAGENS ===== */

.galeria-unica{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:16px;
margin-top:18px;
}

/* CARDS */

.card{
background:var(--card-bg);
border-radius:var(--raio);
padding:14px;
box-shadow:var(--sombra);
text-align:center;
border:1px solid var(--borda-suave);
transition:transform .18s ease, box-shadow .18s ease;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;left:0;right:0;
height:5px;
background:linear-gradient(90deg,var(--cor1),var(--roxo));
}

.card:hover{
transform:translateY(-4px);
box-shadow:var(--sombra-hover);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:14px;
margin-top:6px;
box-shadow:0 4px 14px rgba(0,0,0,0.18);
transition:transform .25s ease;
}

.card:hover img{
transform:scale(1.04);
}

.nome-med{
font-weight:800;
font-size:19px;
margin-top:10px;
color:var(--cor2);
line-height:1.25;
}

.card div{
font-size:14px;
color:var(--texto-suave);
margin-top:3px;
}

/* MINIATURAS - painel rápido, mais visível */

.painel-miniaturas{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
gap:10px;
margin-top:12px;
}

.miniatura{
background:var(--card-bg);
border-radius:14px;
padding:6px;
text-align:center;
box-shadow:0 4px 10px rgba(19,55,109,0.14);
border:1px solid var(--borda-suave);
transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
cursor:default;
}

.miniatura:hover{
transform:scale(1.08);
box-shadow:0 8px 18px rgba(19,55,109,0.22);
border-color:var(--cor1);
}

.miniatura img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.miniatura span{
font-size:11.5px;
display:block;
margin-top:5px;
line-height:1.2;
font-weight:700;
color:var(--cor2);
}

/* placeholder quando sem foto */
.card img[src=""],
.miniatura img[src=""]{
display:none;
}

.alerta{
position:fixed;
bottom:0;
left:0;
right:0;
background:#c62828;
color:white;
text-align:center;
padding:25px;
font-size:26px;
}

/* MEDICAMENTO EM ALERTA */

.med-alerta{
transform:scale(1.25);
box-shadow:0 0 0 4px #fff, 0 0 28px 6px rgba(255,0,0,0.55);
border:3px solid red;
z-index:10;
position:relative;
animation:pulsar 1s infinite alternate;
}

@keyframes pulsar{
from{transform:scale(1.2);}
to{transform:scale(1.3);}
}

/* ESCURECER OUTROS MEDICAMENTOS */

.med-desfocado{
opacity:0.3;
filter:blur(1px);
}

/* ALERTA */

.alerta-med{
position:fixed;
bottom:0;
left:0;
right:0;
background:linear-gradient(180deg,#d32f2f,#a01c1c);
color:white;
text-align:center;
padding:28px 20px 24px;
font-size:24px;
z-index:9999;
box-shadow:0 -8px 30px rgba(0,0,0,0.4);
border-top:4px solid #ffb84d;
line-height:1.4;
}

.alerta-med strong{
font-size:28px;
display:inline-block;
margin:4px 0;
}

/* ===== SELO DE SEGURANÇA / DADOS LOCAIS ===== */

.selo-seguranca{
max-width:560px;
margin:14px auto 0;
background:rgba(255,255,255,0.95);
border:1.5px solid var(--verde);
color:#1b5e2e;
border-radius:14px;
padding:12px 16px;
font-size:13px;
line-height:1.4;
box-shadow:0 4px 14px rgba(0,0,0,0.12);
display:flex;
gap:10px;
align-items:flex-start;
}

.selo-seguranca .icone-cadeado{
font-size:20px;
flex-shrink:0;
}

/* ===== MODAL DE CONFERÊNCIA / CHECKLIST ===== */

.overlay-checklist{
position:fixed;
inset:0;
background:rgba(8,25,55,0.72);
backdrop-filter:blur(3px);
display:flex;
align-items:center;
justify-content:center;
z-index:9998;
padding:16px;
}

.modal-checklist{
background:#fff;
border-radius:20px;
max-width:440px;
width:100%;
max-height:88vh;
overflow-y:auto;
padding:22px;
box-shadow:0 20px 60px rgba(0,0,0,0.45);
}

.modal-checklist h2{
margin:0 0 4px;
font-size:19px;
color:var(--cor2);
display:flex;
align-items:center;
gap:8px;
}

.modal-checklist .subtitulo{
font-size:13px;
color:var(--texto-suave);
margin-bottom:14px;
}

.resumo-dados{
background:#f4f7fc;
border-radius:12px;
padding:12px 14px;
font-size:14px;
margin-bottom:14px;
border:1px solid var(--borda-suave);
}

.resumo-dados div{
margin:3px 0;
}

.lista-checklist{
list-style:none;
margin:0 0 16px;
padding:0;
display:flex;
flex-direction:column;
gap:8px;
}

.lista-checklist li{
display:flex;
align-items:flex-start;
gap:10px;
font-size:13.5px;
padding:9px 10px;
border-radius:10px;
background:#f8fafc;
border:1px solid var(--borda-suave);
}

.lista-checklist li.item-ok{
border-color:rgba(46,158,91,0.4);
background:rgba(46,158,91,0.08);
color:#1b5e2e;
}

.lista-checklist li.item-alerta{
border-color:rgba(255,152,0,0.5);
background:rgba(255,152,0,0.1);
color:#8a5300;
}

.lista-checklist li.item-erro{
border-color:rgba(229,72,77,0.5);
background:rgba(229,72,77,0.1);
color:#a01c1c;
}

.lista-checklist .marca{
font-size:16px;
line-height:1;
flex-shrink:0;
}

.confirmacao-linha{
display:flex;
align-items:flex-start;
gap:8px;
font-size:13.5px;
background:#fff7e6;
border:1.5px solid var(--laranja);
border-radius:12px;
padding:12px;
margin-bottom:14px;
}

.confirmacao-linha input[type="checkbox"]{
width:auto;
margin:2px 0 0;
accent-color:var(--laranja);
flex-shrink:0;
}

.botoes-modal{
display:flex;
gap:10px;
}

.botoes-modal button{
margin-top:0;
}

.btn-cancelar-checklist{
background:#e9edf5;
color:var(--texto);
box-shadow:none;
}

.btn-cancelar-checklist:hover{
transform:none;
filter:brightness(0.97);
box-shadow:none;
}

.btn-confirmar-checklist:disabled{
opacity:0.5;
cursor:not-allowed;
filter:none;
transform:none;
}

/* empty state */
.vazio{
grid-column:1/-1;
text-align:center;
color:rgba(255,255,255,0.9);
background:rgba(255,255,255,0.12);
border:1.5px dashed rgba(255,255,255,0.5);
border-radius:16px;
padding:22px 14px;
font-size:14px;
}

@media (max-width:420px){
header{font-size:20px;padding:16px 10px;}
.nome-med{font-size:17px;}
}

</style>
</head>

<body>

<header>
💊 Controle Inteligente de Medicamentos
</header>

<div class="selo-seguranca">
<span class="icone-cadeado">🔒</span>
<span>Todos os medicamentos e fotos ficam salvos <strong>somente neste dispositivo</strong> (armazenamento local do navegador). Nenhuma informação é enviada para a internet ou para servidores externos.</span>
</div>

<div class="container">

<form>

<label>👤 Paciente</label>
<input type="text" id="paciente">

<label>💊 Medicamento cadastrado</label>
<select id="medicamento">
<option value="">Confira seus medicamentos</option>
</select>

<label>➕ Novo medicamento</label>
<input type="text" id="novoMedicamento" placeholder="Adicionar novo medicamento">

<button type="button" onclick="adicionarMedicamentoLista()">➕ Adicionar medicamento</button>

<button type="button" class="btn-excluir" onclick="removerMedicamentoLista()">🗑️ Remover medicamento</button>

<label>🔢 Quantidade por dose</label>
<input type="number" id="quantidade">

<label>📦 Código de barras</label>
<input type="text" id="codigoBarras" readonly>

<button type="button" class="btn-scan" onclick="iniciarScanner()">📷 Escanear Código</button>

<div id="scanner"></div>

<label>⏰ Quantas vezes ao dia?</label>
<select id="vezes">
<option value="1">1x</option>
<option value="2">2x</option>
<option value="3">3x</option>
<option value="4">4x</option>
</select>

<label>📅 Período</label>
<select id="periodo">
<option value="7">Semanal</option>
<option value="15">Quinzenal</option>
<option value="30">Mensal</option>
</select>

<div id="horariosContainer"></div>

<label>📷 Foto</label>
<input type="file" accept="image/*" capture="environment" id="foto">

<button type="button" onclick="verificarEConfirmar()">💾 Salvar Medicamento</button>

</form>

<h3 class="secao-titulo">📋 Meus Medicamentos</h3>

<div id="painelMiniaturas" class="painel-miniaturas"></div>

<h3 class="secao-titulo">📦 Detalhes da Biblioteca</h3>

<div class="galeria-unica" id="galeriaUnica"></div>

</div>

<audio id="alarmeSom" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<div id="mensagem"></div>

<script>

/* BANCO LOCAL */

let medicamentos = JSON.parse(localStorage.getItem("medicamentos")) || [];

let listaMedicamentos = JSON.parse(localStorage.getItem("listaMedicamentos")) || [];

/* LISTA */

function atualizarListaMedicamentos(){

let select=document.getElementById("medicamento");

select.innerHTML='<option value="">Confira seus medicamentos</option>';

listaMedicamentos.forEach(nome=>{

let option=document.createElement("option");

option.value=nome;

option.textContent=nome;

select.appendChild(option);

});

}

function adicionarMedicamentoLista(){

let novo=document.getElementById("novoMedicamento").value.trim();

if(!novo) return;

if(!listaMedicamentos.includes(novo)){

listaMedicamentos.push(novo);

localStorage.setItem("listaMedicamentos",JSON.stringify(listaMedicamentos));

}

atualizarListaMedicamentos();

document.getElementById("novoMedicamento").value="";

}

function removerMedicamentoLista(){

let nome=document.getElementById("medicamento").value;

listaMedicamentos=listaMedicamentos.filter(m=>m!==nome);

localStorage.setItem("listaMedicamentos",JSON.stringify(listaMedicamentos));

atualizarListaMedicamentos();

}

/* HORÁRIOS */

document.getElementById("vezes").addEventListener("change",gerarHorarios)

function gerarHorarios(){

let container=document.getElementById("horariosContainer");

container.innerHTML="";

let vezes=document.getElementById("vezes").value;

for(let i=0;i<vezes;i++){

container.innerHTML+=`<input type="time" class="horario">`;

}

}

gerarHorarios();

/* SCANNER */

function iniciarScanner(){

document.getElementById("scanner").style.display="block";

Quagga.init({

inputStream:{type:"LiveStream",target:"#scanner",constraints:{facingMode:"environment"}},

decoder:{readers:["ean_reader","code_128_reader"]}

},function(err){

if(err){console.log(err);return;}

Quagga.start();

});

Quagga.onDetected(function(data){

document.getElementById("codigoBarras").value=data.codeResult.code;

Quagga.stop();

document.getElementById("scanner").style.display="none";

});

}

/* SALVAR */

function salvarMedicamento(){

let paciente=document.getElementById("paciente").value;

let medicamento=document.getElementById("medicamento").value || document.getElementById("novoMedicamento").value;

let quantidade=document.getElementById("quantidade").value;

let codigo=document.getElementById("codigoBarras").value;

let periodo=document.getElementById("periodo").value;

let horarios=[...document.querySelectorAll(".horario")].map(h=>h.value);

let foto=document.getElementById("foto").files[0];

if(!paciente||!medicamento||!quantidade||horarios.includes("")){

alert("Preencha todos os campos");

return;

}

let salvar=(img)=>{

medicamentos.push({

paciente,

medicamento,

quantidade,

codigoBarras:codigo,

horarios,

dosesTomadas:[],

foto:img,

periodo,

dataInicio:Date.now(),

ultimoReset:Date.now()

});

localStorage.setItem("medicamentos",JSON.stringify(medicamentos));

atualizarGaleria();

atualizarPainelMiniaturas();

limparCampos();

};

if(foto){

let reader=new FileReader();

reader.onload=e=>salvar(e.target.result);

reader.readAsDataURL(foto);

}else{

salvar(null);

}

}

/* ===================================================== */
/* CONFERÊNCIA DE SEGURANÇA - CHECKLIST ANTES DE SALVAR   */
/* (camada adicional; não modifica salvarMedicamento())   */
/* ===================================================== */

function coletarDadosFormulario(){

return {

paciente: document.getElementById("paciente").value.trim(),

medicamento: (document.getElementById("medicamento").value || document.getElementById("novoMedicamento").value).trim(),

quantidade: document.getElementById("quantidade").value,

codigo: document.getElementById("codigoBarras").value.trim(),

periodo: document.getElementById("periodo").value,

horarios: [...document.querySelectorAll(".horario")].map(h=>h.value),

foto: document.getElementById("foto").files[0]

};

}

function gerarChecklistSeguranca(dados){

let checklist=[];

let temErro=false;

if(!dados.paciente){

checklist.push({status:"erro",texto:"Nome do paciente não informado."});

temErro=true;

}else{

checklist.push({status:"ok",texto:"Paciente informado: "+dados.paciente});

}

if(!dados.medicamento){

checklist.push({status:"erro",texto:"Nome do medicamento não informado."});

temErro=true;

}else if(!/[a-zA-Zà-úÀ-Ú]/.test(dados.medicamento)){

checklist.push({status:"erro",texto:"Nome do medicamento parece inválido (não contém letras)."});

temErro=true;

}else{

checklist.push({status:"ok",texto:"Medicamento informado: "+dados.medicamento});

}

let qtdNum=Number(dados.quantidade);

if(!dados.quantidade||isNaN(qtdNum)||qtdNum<=0){

checklist.push({status:"erro",texto:"Quantidade por dose inválida ou não preenchida."});

temErro=true;

}else if(qtdNum>10){

checklist.push({status:"alerta",texto:"Quantidade alta ("+qtdNum+"). Confirme com o médico ou farmacêutico antes de salvar."});

}else{

checklist.push({status:"ok",texto:"Quantidade por dose: "+qtdNum});

}

if(!dados.horarios.length||dados.horarios.includes("")){

checklist.push({status:"erro",texto:"Existem horários de administração não preenchidos."});

temErro=true;

}else{

let duplicados=dados.horarios.some((h,i)=>dados.horarios.indexOf(h)!==i);

if(duplicados){

checklist.push({status:"alerta",texto:"Há horários repetidos na lista de horários."});

}else{

checklist.push({status:"ok",texto:"Horários definidos: "+dados.horarios.join(", ")});

}

}

if(dados.codigo){

let digitos=dados.codigo.replace(/\D/g,"");

if(![8,12,13,14].includes(digitos.length)||digitos!==dados.codigo){

checklist.push({status:"alerta",texto:"Código de barras não parece seguir um padrão válido (EAN/UPC). Confira antes de salvar."});

}else{

checklist.push({status:"ok",texto:"Código de barras no padrão válido: "+dados.codigo});

}

}else{

checklist.push({status:"alerta",texto:"Nenhum código de barras informado (opcional, mas recomendado para conferência)."});

}

if(!dados.foto){

checklist.push({status:"alerta",texto:"Nenhuma foto anexada. Recomendado para identificar o medicamento com segurança."});

}else{

checklist.push({status:"ok",texto:"Foto anexada para identificação visual."});

}

return {checklist,temErro};

}

function verificarEConfirmar(){

let dados=coletarDadosFormulario();

let resultado=gerarChecklistSeguranca(dados);

if(resultado.temErro){

let mensagens=resultado.checklist.filter(i=>i.status==="erro").map(i=>"• "+i.texto).join("\n");

alert("Corrija os itens abaixo antes de salvar:\n\n"+mensagens);

return;

}

mostrarModalChecklist(dados,resultado.checklist);

}

function mostrarModalChecklist(dados,checklist){

let existente=document.querySelector(".overlay-checklist");

if(existente) existente.remove();

let overlay=document.createElement("div");

overlay.className="overlay-checklist";

let itensHtml=checklist.map(i=>{

let icone= i.status==="ok" ? "✅" : (i.status==="alerta" ? "⚠️" : "❌");

let classe= i.status==="ok" ? "item-ok" : (i.status==="alerta" ? "item-alerta" : "item-erro");

return `<li class="${classe}"><span class="marca">${icone}</span><span>${i.texto}</span></li>`;

}).join("");

overlay.innerHTML=`

<div class="modal-checklist">

<h2>🔎 Conferência do Medicamento</h2>

<div class="subtitulo">Revise as informações abaixo antes de salvar. Seus dados continuam salvos apenas neste dispositivo.</div>

<div class="resumo-dados">

<div>👤 <strong>Paciente:</strong> ${dados.paciente}</div>

<div>💊 <strong>Medicamento:</strong> ${dados.medicamento}</div>

<div>🔢 <strong>Quantidade:</strong> ${dados.quantidade}</div>

<div>⏰ <strong>Horários:</strong> ${dados.horarios.join(", ")}</div>

<div>📦 <strong>Código de barras:</strong> ${dados.codigo || "não informado"}</div>

</div>

<ul class="lista-checklist">

${itensHtml}

</ul>

<label class="confirmacao-linha">

<input type="checkbox" id="checkConfirmacaoSalvar">

<span>Confirmo que conferi o nome, a quantidade e os horários deste medicamento e as informações estão corretas.</span>

</label>

<div class="botoes-modal">

<button type="button" class="btn-cancelar-checklist" onclick="fecharModalChecklist()">Cancelar</button>

<button type="button" class="btn-confirmar-checklist" id="btnConfirmarSalvar" disabled onclick="confirmarSalvamento()">✔ Confirmar e Salvar</button>

</div>

</div>

`;

document.body.appendChild(overlay);

document.getElementById("checkConfirmacaoSalvar").addEventListener("change",function(){

document.getElementById("btnConfirmarSalvar").disabled=!this.checked;

});

}

function fecharModalChecklist(){

let overlay=document.querySelector(".overlay-checklist");

if(overlay) overlay.remove();

}

function confirmarSalvamento(){

fecharModalChecklist();

salvarMedicamento();

}

/* GALERIA */

function atualizarGaleria(){

let galeria=document.getElementById("galeriaUnica");

galeria.innerHTML="";

medicamentos.forEach((med,index)=>{

galeria.innerHTML+=`

<div class="card">

${med.foto?`<img src="${med.foto}">`:""}

<div class="nome-med">${med.medicamento}</div>

<div>👤 ${med.paciente}</div>

<div>💊 ${med.quantidade}</div>

<div>📦 ${med.codigoBarras||"-"}</div>

<button class="btn-excluir" onclick="excluirMedicamento(${index})">Excluir</button>

</div>

`;

});

}

/* MINIATURAS */

function atualizarPainelMiniaturas(){

let painel=document.getElementById("painelMiniaturas");

painel.innerHTML="";

let colunas=Math.ceil(Math.sqrt(medicamentos.length));

if(colunas<4) colunas=4;

painel.style.gridTemplateColumns=`repeat(${colunas},1fr)`;

medicamentos.forEach(med=>{

painel.innerHTML+=`

<div class="miniatura">

${med.foto?`<img src="${med.foto}">`:""}

<span>${med.medicamento}</span>

</div>

`;

});

}

/* EXCLUIR */

function excluirMedicamento(index){

medicamentos.splice(index,1);

localStorage.setItem("medicamentos",JSON.stringify(medicamentos));

atualizarGaleria();

atualizarPainelMiniaturas();

}
function destacarMedicamento(index){

let cards=document.querySelectorAll(".card");

cards.forEach(c=>{

c.classList.remove("med-alerta");
c.classList.add("med-desfocado");

});

if(cards[index]){

cards[index].classList.add("med-alerta");
cards[index].classList.remove("med-desfocado");

cards[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

}

}
/* LIMPAR */

function limparCampos(){

document.getElementById("paciente").value="";

document.getElementById("novoMedicamento").value="";

document.getElementById("quantidade").value="";

document.getElementById("codigoBarras").value="";

document.getElementById("foto").value="";

}

/* ALERTA */

function verificarHorario(){

let agora=new Date().toTimeString().slice(0,5);

medicamentos.forEach((med,index)=>{

med.horarios.forEach(h=>{

if(h===agora){

destacarMedicamento(index);

dispararAlerta(med,index);

}

});

});

}

setInterval(verificarHorario,30000);

function dispararAlerta(med,index){

let som=document.getElementById("alarmeSom");

let contador=0;

let intervalo=setInterval(()=>{

if(!document.querySelector(".alerta-med")){
clearInterval(intervalo);
return;
}

if(contador%2===0){

som.play();

}else{

let fala=new SpeechSynthesisUtterance(
"Atenção. Hora de tomar " +
med.quantidade +
" comprimido de " +
med.medicamento
);

fala.lang="pt-BR";

speechSynthesis.speak(fala);

}

contador++;

},7000);

mostrarAlerta(med,index);

}

/* INICIALIZA */

atualizarListaMedicamentos();

atualizarGaleria();

atualizarPainelMiniaturas();

function mostrarAlerta(med,index){

let div=document.createElement("div");

div.className="alerta-med";

div.innerHTML=`
💊 Hora do medicamento:<br>
<strong>${med.medicamento}</strong><br>
Quantidade: ${med.quantidade}
<br><br>
<button class="botao-concluir" onclick="confirmarDose(${index})">
✔ Medicação feita
</button>
`;

document.body.appendChild(div);

}
function confirmarDose(index){

let alerta=document.querySelector(".alerta-med");

if(alerta) alerta.remove();

let cards=document.querySelectorAll(".card");

cards.forEach(c=>{

c.classList.remove("med-alerta");
c.classList.remove("med-desfocado");

});

}
</script>

</body>
</html>
