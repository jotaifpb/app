<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<!-- SEGURANÇA 1
Content Security Policy bloqueia execução de scripts externos maliciosos -->
<meta http-equiv="Content-Security-Policy" 
content="default-src 'self'; script-src 'self' https://unpkg.com; img-src 'self' data:; media-src https://actions.google.com">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Medicamentos Seguro</title>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

input,select,button{
width:100%;
padding:15px;
margin:10px 0;
font-size:20px;
border-radius:10px;
}

button{
background:#1976d2;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>🔒 Controle Seguro de Medicamentos</h2>

<!-- SEGURANÇA 2
PIN de acesso para proteger acesso ao sistema -->

<input type="password" id="pin" placeholder="Digite o PIN de acesso">
<button onclick="verificarPIN()">Entrar</button>

<div id="sistema" style="display:none;">

<input type="text" id="paciente" placeholder="Paciente">
<input type="text" id="medicamento" placeholder="Medicamento">

<input type="number" id="quantidade" placeholder="Quantidade">

<select id="vezes">
<option value="1">1x ao dia</option>
<option value="2">2x ao dia</option>
<option value="3">3x ao dia</option>
</select>

<div id="horariosContainer"></div>

<button onclick="salvarMedicamento()">Salvar</button>

<div id="lista"></div>

</div>

</div>

<script>

/* ===============================
SEGURANÇA 3
PIN padrão criptografado
=============================== */

const PIN_HASH = btoa("1234") // base64 (exemplo simples)

/* ===============================
SEGURANÇA 4
Verificação de autenticação
=============================== */

function verificarPIN(){

let pin=document.getElementById("pin").value

if(btoa(pin)===PIN_HASH){

document.getElementById("sistema").style.display="block"

}else{

alert("PIN incorreto")

}

}

/* ===============================
SEGURANÇA 5
Função para sanitizar dados
Evita XSS
=============================== */

function sanitizar(texto){

return texto
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"")

}

/* ===============================
SEGURANÇA 6
Criptografia simples antes de salvar
=============================== */

function criptografar(dados){

return btoa(JSON.stringify(dados))

}

function descriptografar(dados){

if(!dados) return []

return JSON.parse(atob(dados))

}

/* ===============================
SEGURANÇA 7
Carrega dados criptografados
=============================== */

let medicamentos = descriptografar(localStorage.getItem("medicamentos"))

/* ===============================
SEGURANÇA 8
Limite de armazenamento
Evita abuso
=============================== */

const LIMITE_MEDICAMENTOS = 50

/* ===============================
GERAR HORÁRIOS
=============================== */

document.getElementById("vezes").addEventListener("change",gerarHorarios)

gerarHorarios()

function gerarHorarios(){

let container=document.getElementById("horariosContainer")

container.innerHTML=""

let vezes=document.getElementById("vezes").value

for(let i=0;i<vezes;i++){

container.innerHTML+=`<input type="time" class="horario">`

}

}

/* ===============================
SEGURANÇA 9
Proteção contra múltiplos cliques
=============================== */

let salvando=false

function salvarMedicamento(){

if(salvando) return

salvando=true

setTimeout(()=>salvando=false,2000)

/* ===============================
SEGURANÇA 10
Validação de dados
=============================== */

let paciente=sanitizar(document.getElementById("paciente").value)

let medicamento=sanitizar(document.getElementById("medicamento").value)

let quantidade=parseInt(document.getElementById("quantidade").value)

let horarios=Array.from(document.getElementsByClassName("horario")).map(h=>h.value)

if(!paciente || !medicamento || !quantidade){

alert("Preencha todos os campos")

return

}

/* ===============================
SEGURANÇA 11
Limite de registros
=============================== */

if(medicamentos.length>=LIMITE_MEDICAMENTOS){

alert("Limite de medicamentos atingido")

return

}

let novo={

paciente,
medicamento,
quantidade,
horarios

}

medicamentos.push(novo)

/* ===============================
SEGURANÇA 12
Salvar dados criptografados
=============================== */

localStorage.setItem("medicamentos",criptografar(medicamentos))

mostrar()

}

/* ===============================
EXIBIÇÃO SEGURA
=============================== */

function mostrar(){

let lista=document.getElementById("lista")

lista.innerHTML=""

medicamentos.forEach(med=>{

let div=document.createElement("div")

div.innerText=`${med.paciente} - ${med.medicamento} - ${med.quantidade}`

lista.appendChild(div)

})

}

mostrar()

</script>

</body>
</html>
